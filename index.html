<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>找尋失落的手稿 Lost Manuscript | V68.1 System Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c2c2c; --accent: #8e7341; --rpg-bg: rgba(18, 18, 18, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Noto Serif TC', serif; }
        #viewport { width: 100%; height: 100dvh; background-color: #000; position: relative; overflow: hidden; }
        
        #shutter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 90000; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; visibility: hidden; }
        #shutter.active { visibility: visible; opacity: 1; pointer-events: auto; }
        
        .stage-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 10; transition: opacity 0.4s; }
        .stage-layer.active { opacity: 1 !important; visibility: visible !important; }
        .bg-layer { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index: 1; }
        .bg-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.45); z-index: 2; opacity: 0; transition: opacity 0.8s; }
        .in-game .bg-overlay { opacity: 1; }

        /* [修復 4] 管家層級永遠在最上方 */
        .actor-slot { position: absolute; z-index: 50000; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        .cine-actor-slot { bottom: 23vh; left: 50%; transform: translateX(-50%); width: 320px; height: 320px; }
        .gp-actor-slot { bottom: 18vh; left: 5px; width: 180px; height: 180px; }
        .actor-img { width: 100%; height: 100%; object-fit: contain; opacity: 0; visibility: hidden; transition: opacity 0.3s ease-out; }
        .actor-img.visible { opacity: 1 !important; visibility: visible !important; }

        .gp-footer { position: absolute; bottom: 20px; left: 4%; width: 92%; height: 21vh; background: var(--rpg-bg); border: 2.1px solid var(--accent); border-radius: 18px; z-index: 40000; padding: 20px; display: none; align-items: center; justify-content: center; text-align: center; cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .text-body { font-size: 0.95rem; line-height: 1.7; color: #ffffff; letter-spacing: 1px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .text-body.fade-in { animation: pureFade 0.6s forwards; }
        @keyframes pureFade { from { opacity: 0; } to { opacity: 1; } }
        
        .next-tip { position: absolute; bottom: 12px; right: 20px; color: var(--accent); font-size: 0.7rem; font-weight: 700; display: none; animation: tipBlink 1.5s infinite; pointer-events: none; }
        @keyframes tipBlink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .rpg-btn { display: inline-block; padding: 12px 35px; border: 2px solid var(--accent); background: rgba(0,0,0,0.7); color: var(--accent); font-weight: 700; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.2s; pointer-events: auto !important; margin-top: 10px; }
        
        .map-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 85%; margin: 0 auto; }
        .node { height: 48px; background: #f9f9f9; border: 1px solid #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #333; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .node.solved { background: var(--accent); color: #fff; border-color: var(--accent); }

        .cmd-win { position: fixed; top: 18%; left: 50%; transform: translateX(-50%); width: 85%; background: #fff; border: 3px solid var(--primary); padding: 25px; z-index: 45000; display: none; border-radius: 12px; }
        .cmd-input { width: 100%; border: none; border-bottom: 2.5px solid var(--accent); padding: 10px; text-align: center; font-size: 1.8rem; margin-bottom: 15px; font-family: inherit; outline: none; border-radius: 0; }
    </style>
</head>
<body>
<div id="shutter"></div>
<audio id="bgm" loop><source src="https://jiaoxi.wellspringbysilks.com/silksspringfile/Wellspring/Beitou/Anniversary/bgm.mp3" type="audio/mpeg"></audio>

<div id="viewport">
    <img id="main-bg" src="https://i.meee.com.tw/HVp4AAn.jpg" class="bg-layer">
    <div class="bg-overlay" id="main-overlay"></div>
    <div id="stage-init" class="stage-layer active">
        <div style="position:fixed; bottom:8vh; left:0; width:100%; display:flex; flex-direction:column; align-items:center; z-index:100;">
            <div class="rpg-btn" style="padding:18px 50px;" onclick="Game.start()">進入遊戲 ENTER</div>
        </div>
    </div>
    <div id="stage-cine" class="stage-layer">
        <div class="actor-slot cine-actor-slot"><img id="cine-actor" class="actor-img"></div>
        <div class="gp-footer" id="cine-db"><div id="cine-txt" class="text-body"></div><div class="next-tip" id="cine-tip">下一步 ▼</div></div>
    </div>
    <div id="stage-gp" class="stage-layer">
        <div class="gp-header" id="gp-header" style="position:absolute; top:0; left:0; width:100%; padding:30px 20px; z-index:9500; display:none;">
            <div id="prog-text" style="font-size:0.65rem; color:var(--accent); font-weight:700;">手稿回收進度 0/6</div>
            <div id="prog-bar" style="display:flex; gap:6px; height:6px; margin-top:5px;"></div>
        </div>
        <div class="gp-stage" id="gp-canvas" style="width:100%; height:72vh; display:flex; align-items:center; justify-content:center;"></div>
        <div class="actor-slot gp-actor-slot"><img id="gp-actor" class="actor-img"></div>
        <div class="gp-footer" id="gp-db"><div id="gp-txt" class="text-body"></div><div class="next-tip" id="gp-tip">下一步 ▼</div></div>
    </div>
</div>

<div id="cmd-win" class="cmd-win">
    <h3 id="cmd-title" style="margin-top:0; text-align:center;">輸入答案</h3>
    <input type="tel" id="p-input" class="cmd-input" maxlength="4" placeholder="••••" inputmode="numeric">
    <div class="rpg-btn" style="width:100%; background:var(--primary); color:#fff; border:none;" id="cmd-submit">驗證密碼</div>
</div>

<script>
    const ICONS = { SOB: 'https://i.meee.com.tw/PF2vL48.png', CRY: 'https://i.meee.com.tw/TLurp4f.png', THANKS: 'https://i.meee.com.tw/zMIVu6x.png', HELLO: 'https://i.meee.com.tw/CVowXAw.png', FIND: 'https://i.meee.com.tw/4XGSBDB.png', SHH: 'https://i.meee.com.tw/oTG4WZX.png' };
    
    // [修復 5] 音樂離開視窗即暫停
    document.addEventListener("visibilitychange", () => {
        const bgm = document.getElementById('bgm');
        if (document.hidden) bgm.pause();
        else if (Game.state.musicPlaying) bgm.play().catch(()=>{});
    });

    const Game = {
        state: { solved: [], userName: '', isBusy: false, musicPlaying: false },
        
        async setStage(id) {
            document.getElementById('shutter').classList.add('active');
            await new Promise(r => setTimeout(r, 600)); 
            document.getElementById('viewport').className = (id === 'stage-init') ? "" : "in-game";
            document.getElementById('main-bg').src = (id === 'stage-init') ? "https://i.meee.com.tw/HVp4AAn.jpg" : "https://i.meee.com.tw/ApxxBEa.jpg";
            document.querySelectorAll('.actor-img').forEach(img => img.classList.remove('visible'));
            document.querySelectorAll('.gp-footer').forEach(f => { f.style.display = "none"; f.onclick = null; });
            document.querySelectorAll('.stage-layer').forEach(l => l.classList.remove('active'));
            const target = document.getElementById(id); if(target) target.classList.add('active');
            await new Promise(r => setTimeout(r, 200)); document.getElementById('shutter').classList.remove('active');
        },

        start() { 
            this.state.musicPlaying = true;
            document.getElementById('bgm').play().catch(()=>{}); 
            this.initPrologue(); 
        },

        async initPrologue() {
            await this.setStage('stage-cine');
            // [修復 1 & 2] 刪除「」，拆分詢問
            this.runAutoSeq('CINE', [
                {m:'SOB', t:'（啜泣聲）嗚嗚嗚…'},
                {m:'SOB', t:'您好，我是飯店的管家小晶…'},
                {m:'SOB', t:'最近飯店要籌備滿一周年的活動，'},
                {m:'SOB', t:'想要展示設計師珍貴的手稿，'},
                {m:'SOB', t:'結果...我不小心弄丟了...'},
                {m:'CRY', t:'（嚎啕大哭）嗚哇哇哇'},
                {m:'SOB', t:'好心的旅人...'},
                {m:'SOB', t:'您願意陪我一起找回手稿嗎？'}
            ], () => {
                setTimeout(() => {
                    const txt = document.getElementById('cine-txt');
                    txt.innerHTML = `<div class="rpg-btn" onclick="Game.acceptMission()">好啊！我願意幫忙！</div>`;
                }, 2000);
            });
        },

        async acceptMission() { 
            this.runManualSeq('CINE', [
                {m:'THANKS', t:'太感謝您了！'}, 
                {m:'THANKS', t:'我要怎麼稱呼您呢？'}
            ], () => this.stepInputName()); 
        },

        async stepInputName() { 
            const txt = document.getElementById('cine-txt');
            document.getElementById('cine-tip').style.display = "none";
            txt.innerHTML = `<div style="margin-top:10px;"><input type="text" id="p-name" placeholder="輸入名稱" style="background:transparent;border:none;border-bottom:2px solid #fff;color:#fff;text-align:center;width:160px;font-family:inherit;font-size:1.2rem;" autocomplete="off"><br><button class="rpg-btn" onclick="Game.submitName()">出發找手稿</button></div>`;
            txt.classList.add('fade-in');
            setTimeout(() => document.getElementById('p-name').focus(), 300);
        },

        submitName() { const n = document.getElementById('p-name').value.trim(); if(!n) return; this.state.userName = n; this.renderMap(); },

        async renderMap() {
            await this.setStage('stage-gp');
            document.getElementById('gp-header').style.display = "block";
            this.updateProg();
            document.getElementById('gp-db').style.display = "flex";
            const canvas = document.getElementById('gp-canvas'); canvas.innerHTML = `<div class="map-grid" id="grid"></div>`;
            [0,1,2,3,4,5].reverse().forEach(id => {
                const node = document.createElement('div');
                node.className = `node ${this.state.solved.includes(id)?'solved':''}`;
                node.innerText = `${id===0?'1F 泉':id===1?'2F 煙':id===2?'2F 浸':id===3?'5F 織':id===4?'5F 紋':'6F 岩'}`;
                node.onclick = () => { if(!this.state.isBusy && !this.state.solved.includes(id)) this.goChapter(id); };
                document.getElementById('grid').appendChild(node);
            });
            this.sayGP("每一層樓，都藏著一個線索。你想去哪層呢？", 'HELLO');
        },

        async goChapter(idx) {
            await this.setStage('stage-gp');
            this.state.curIdx = idx;
            document.getElementById('gp-canvas').innerHTML = `<div style="width:100%;aspect-ratio:1/1;background:#333;"></div>`;
            // [修復 3] 進入樓層改為自動播放
            this.runAutoSeq('GP', [
                {m:'HELLO', t:'這層樓、是飯店特有的休憩空間，'},
                {m:'HELLO', t:'這裡有大眾風呂、也有戶外泳池，'},
                {m:'HELLO', t:'能泡湯又能玩水，深受很多客人喜愛，'},
                {m:'HELLO', t:'我們快找到寶箱吧！'}
            ], () => {
                this.sayGP("找到了！解開線索啟動顯影吧。", 'HELLO');
                setTimeout(() => { document.getElementById('cmd-win').style.display = "block"; }, 1000);
            });
        },

        /* ... 其餘邏輯同 V68.0 但移除文字中的「」 ... */

        setMood(mood) {
            const el = document.getElementById('stage-cine').classList.contains('active') ? document.getElementById('cine-actor') : document.getElementById('gp-actor');
            if(el && mood) { el.src = ICONS[mood]; el.classList.add('visible'); }
        },
        async say(id, str, mood = null) {
            if(mood) this.setMood(mood);
            const el = document.getElementById(id); el.classList.remove('fade-in'); void el.offsetWidth;
            el.innerHTML = str; el.classList.add('fade-in');
            await new Promise(r => setTimeout(r, 600));
        },
        sayGP(s, mood = null) { return this.say('gp-txt', s, mood); },
        runAutoSeq(mode, lines, callback) {
            this.state.isBusy = true; const txtId = mode === 'CINE' ? 'cine-txt' : 'gp-txt';
            const db = document.getElementById(mode === 'CINE' ? 'cine-db' : 'gp-db');
            if(document.getElementById(mode === 'CINE' ? 'cine-tip' : 'gp-tip')) document.getElementById(mode === 'CINE' ? 'cine-tip' : 'gp-tip').style.display = "none";
            db.style.display = "flex"; db.onclick = null;
            let q = [...lines];
            const next = async () => { if (q.length > 0) { const line = q.shift(); await this.say(txtId, line.t, line.m); setTimeout(() => { if (q.length > 0) next(); else { this.state.isBusy = false; if(callback) callback(); } }, 2500); } }; next();
        },
        runManualSeq(mode, lines, callback) {
            this.state.isBusy = false; const db = document.getElementById(mode === 'CINE' ? 'cine-db' : 'gp-db');
            const txtId = mode === 'CINE' ? 'cine-txt' : 'gp-txt';
            const tip = document.getElementById(mode === 'CINE' ? 'cine-tip' : 'gp-tip');
            let q = [...lines]; db.style.display = "flex";
            const next = async () => { if(tip) tip.style.display = 'none'; const line = q.shift(); await this.say(txtId, line.t, line.m); if (q.length > 0) { db.onclick = next; if(tip) tip.style.display = "block"; } else { db.onclick = callback; if(tip) tip.style.display = "block"; } }; next();
        },
        updateProg() {
            const bar = document.getElementById('prog-bar'); bar.innerHTML = "";
            for(let i=0; i<6; i++) {
                const unit = document.createElement('div');
                unit.style.flex = "1"; unit.style.background = this.state.solved.includes(i) ? "var(--accent)" : "rgba(255,255,255,0.2)";
                bar.appendChild(unit);
            }
        }
    };
</script>
</body>
</html>
