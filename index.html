<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>找尋失落的手稿 Lost Manuscript | V47.7 Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c2c2c; --accent: #8e7341; --rpg-bg: rgba(18, 18, 18, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Noto Serif TC', serif; }
        #viewport { width: 100%; height: 100dvh; background-color: #000; position: relative; overflow: hidden; }
        #shutter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; visibility: hidden; }
        #shutter.active { visibility: visible; opacity: 1; pointer-events: auto; }
        .stage-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 10; transition: opacity 0.3s; }
        .stage-layer.active { opacity: 1 !important; visibility: visible !important; }
        .bg-layer { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index: 1; }
        .bg-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.45); z-index: 2; opacity: 0; transition: opacity 0.8s; }
        .in-game .bg-overlay { opacity: 1; }
        .gp-stage { width: 100%; height: 72vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 20; background: transparent; padding-top: 50px; }
        .ratio-box { width: 100%; aspect-ratio: 1 / 1; position: relative; overflow: hidden; background: transparent; } 
        .main-img { width: 100%; height: 100%; background-size: cover; background-position: center; filter: grayscale(1) blur(10px); opacity: 0; transition: opacity 1.5s ease-in-out, filter 1.5s ease-in-out; }
        .main-img.revealed { filter: grayscale(0) blur(0); opacity: 1; }
        .puzzle-piece { position: absolute; width: 33.33%; height: 50%; background-size: cover; background-position: center; transition: all 2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; z-index: 60; }
        
        .gp-footer { position: absolute; bottom: 20px; left: 4%; width: 92%; height: 21vh; background: var(--rpg-bg); border: 2.1px solid var(--accent); border-radius: 18px; z-index: 1000; padding: 20px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
        .gp-footer::after { content: ""; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; border: 1px solid rgba(142, 115, 65, 0.2); border-radius: 14px; pointer-events: none; }
        
        /* 修正：文字本體設為可穿透，讓內部的 Input 能接收點擊 */
        .text-body { font-size: 0.95rem; line-height: 1.7; color: #ffffff !important; letter-spacing: 1px; width: 100%; opacity: 0; pointer-events: none; }
        .text-body.fade-in { opacity: 1; transition: opacity 0.7s; }
        
        /* 修正：強制讓 Input 恢復點擊權限 */
        input[type="text"], input[type="tel"] { pointer-events: auto !important; position: relative; z-index: 2000; }

        .next-tip { position: absolute; bottom: 12px; right: 20px; color: var(--accent); font-size: 0.7rem; font-weight: 700; display: none; pointer-events: none; animation: tipBlink 1.5s infinite; }
        @keyframes tipBlink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .cine-actor-slot { position: absolute; bottom: 23vh; left: 50%; transform: translateX(-50%); width: 320px; height: 320px; z-index: 1100; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        .gp-actor-slot { position: absolute; bottom: 18vh; left: 5px; width: 180px; height: 180px; z-index: 1100; pointer-events: none; }
        .actor-img { width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s; visibility: hidden; }
        .visible { opacity: 1 !important; visibility: visible !important; }
        .init-nav-fixed { position: fixed; bottom: 8vh; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; }
        .start-gate { padding: 16px 45px; border: 2.5px solid var(--accent); background: rgba(0,0,0,0.7); color: var(--accent); font-weight: 700; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        .gp-header { position: absolute; top: 0; left: 0; width: 100%; padding: 25px 20px 10px; z-index: 500; }
        .prog-bar-main { display: flex; gap: 5px; width: 100%; height: 6px; }
        .prog-unit { flex: 1; background: rgba(255,255,255,0.15); border-radius: 2px; }
        .prog-unit.filled { background: var(--accent) !important; box-shadow: 0 0 10px var(--accent); }
        .map-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 85%; }
        .node { height: 48px; background: rgba(255,255,255,0.96); border: 1.5px solid #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #333; font-size: 1rem; cursor: pointer; }
        .node.solved { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
        .promise-ink { color: var(--accent); font-weight: 700; border: 1.5px dashed var(--accent); padding: 10px 25px; border-radius: 30px; margin-top: 15px; display: inline-block; cursor: pointer; pointer-events: auto; }
        .rpg-btn { background: var(--accent); color: #fff; border: none; padding: 12px 30px; font-weight: 700; cursor:pointer; border-radius: 6px; margin-top: 15px; pointer-events: auto; }
        .cmd-win { position: fixed; top: 22%; left: 50%; transform: translateX(-50%); width: 85%; background: #fff; border: 3px solid #2c2c2c; padding: 25px; z-index: 9999; display: none; border-radius: 12px; }
        .input-lock { pointer-events: none !important; cursor: default; }
    </style>
</head>
<body>
<div id="shutter"></div>
<audio id="bgm" loop><source src="https://jiaoxi.wellspringbysilks.com/silksspringfile/Wellspring/Beitou/Anniversary/bgm.mp3" type="audio/mpeg"></audio>
<audio id="se-reveal"><source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg"></audio>

<div id="viewport">
    <img id="main-bg" src="https://i.meee.com.tw/HVp4AAn.jpg" class="bg-layer">
    <div class="bg-overlay" id="main-overlay"></div>
    <div id="stage-init" class="stage-layer active">
        <div class="init-nav-fixed">
            <div class="start-gate" onclick="Game.start()">進入遊戲 ENTER</div>
            <div style="color:#fff; opacity:0.4; font-size:0.55rem; text-decoration:underline; cursor:pointer; margin-top:20px;" onclick="localStorage.clear(); location.reload();">[ 重置遊戲進度 ]</div>
        </div>
    </div>
    <div id="stage-cine" class="stage-layer">
        <div class="cine-actor-slot"><img id="cine-actor" class="actor-img"></div>
        <div class="gp-footer" id="cine-db"><div id="cine-txt" class="text-body"></div><div class="next-tip" id="cine-tip">下一步 ▼</div></div>
    </div>
    <div id="stage-gp" class="stage-layer">
        <div class="gp-header"><div id="prog-text" style="font-size:0.6rem; color:var(--accent); font-weight:700; margin-bottom:5px;">手稿回收進度 0/6</div><div class="prog-bar-main" id="prog-bar"></div></div>
        <div class="gp-stage" id="gp-canvas"></div>
        <div class="gp-actor-slot"><img id="gp-actor" class="actor-img"></div>
        <div class="gp-footer" id="gp-db"><div id="gp-txt" class="text-body"></div><div class="next-tip" id="gp-tip">下一步 ▼</div></div>
    </div>
</div>

<div class="cmd-win" id="cmd-win">
    <h3 style="margin-top:0; font-size:1.1rem; color:var(--primary); text-align:center;">輸入核銷碼</h3>
    <input type="tel" id="p-input" maxlength="4" placeholder="••••" inputmode="numeric" style="width:100%; border:2px solid #2c2c2c; padding:15px; text-align:center; font-size:1.8rem; margin-bottom:15px;"><button style="width:100%; padding:15px; background:var(--primary); color:#fff; border:none; font-weight:700;" id="submit-btn">驗證碼</button>
</div>

<script>
    const ICONS = { PANIC: 'https://i.meee.com.tw/4GhsHj4.png', HAPPY: 'https://i.meee.com.tw/inZgaqz.png', WINK: 'https://i.meee.com.tw/kpWUNTm.png', SERIOUS: 'https://i.meee.com.tw/W68QVQQ.png', SEARCH: 'https://i.meee.com.tw/hMzAOsN.png', CRY: 'https://i.meee.com.tw/qBmX7A2.png', RUN: 'https://i.meee.com.tw/mcrAWeZ.png' };
    const stationData = [
        { id:0, name:'浸', f:'1F', code:'101', img:'https://i.meee.com.tw/GvFaGGo.jpg', intro:['這層樓最接近大地。','水面與天空重疊時，時間才真正開始流動。'], info:['格柵如煙幕般柔軟，這是「煙」的草圖。'] },
        { id:1, name:'煙', f:'2F', code:'201', img:'https://i.meee.com.tw/XOfo4Y0.jpg', intro:['北投的煙，本無形狀。','但在這裡，它們被編織成牆。'], info:['每一張陶片皆不同。這是「紋」的草圖。'] },
        { id:2, name:'泉', f:'2F', code:'202', img:'https://i.meee.com.tw/ne2rLD7.jpg', intro:['泉水流過百年，留下色彩。'], info:['泉湧出的色階，這是「泉」的草圖。'] },
        { id:3, name:'織', f:'5F', code:'501', img:'https://i.meee.com.tw/H5wykbs.jpg', intro:['歷史是一場編織。'], info:['交織的線條，這是「織」的草圖。'] },
        { id:4, name:'紋', f:'5F', code:'502', img:'https://i.meee.com.tw/0UzAbFP.jpg', intro:['有些印記，無法複製。'], info:['陶片刻劃出的紋路。'] },
        { id:5, name:'岩', f:'6F', code:'601', img:'https://i.meee.com.tw/CJQqf7W.jpg', intro:['安山岩，沉默而厚實。'], info:['火山地質的恩賜，這是「岩」的草圖。'] }
    ];

    const Game = {
        state: { solved: JSON.parse(localStorage.getItem('manuscript_solved') || '[]'), userName: '', curIdx: -1, lastFloor: 1, isTyping: false, completed: localStorage.getItem('manuscript_completed') === 'true' },
        async setStage(id) {
            document.body.classList.add('input-lock');
            const shutter = document.getElementById('shutter');
            shutter.classList.add('active');
            await new Promise(r => setTimeout(r, 600)); 
            document.querySelectorAll('.actor-img').forEach(img => { img.src = ""; img.classList.remove('visible'); });
            const gpc = document.getElementById('gp-canvas'); if(gpc) { gpc.innerHTML = ""; gpc.style.display = "none"; }
            document.querySelectorAll('.text-body').forEach(t => { t.innerHTML = ""; t.classList.remove('fade-in'); }); 
            document.querySelectorAll('.next-tip').forEach(t => t.style.display = "none");
            document.getElementById('viewport').classList.toggle('in-game', id !== 'stage-init');
            document.getElementById('main-bg').src = (id !== 'stage-init') ? "https://i.meee.com.tw/ApxxBEa.jpg" : "https://i.meee.com.tw/HVp4AAn.jpg";
            document.querySelectorAll('.stage-layer').forEach(l => { l.classList.remove('active'); l.style.display = 'none !important'; });
            const target = document.getElementById(id);
            if(target) { target.style.display = 'block !important'; if(id === 'stage-gp') gpc.style.display = "flex"; void target.offsetWidth; target.classList.add('active'); }
            await new Promise(r => setTimeout(r, 200));
            shutter.classList.remove('active');
            await new Promise(r => setTimeout(r, 400));
            document.body.classList.remove('input-lock');
        },
        start() { 
            if(this.state.completed) { this.renderRedeemed(); return; }
            this.updateProg(); const bgm = document.getElementById('bgm'); bgm.play().catch(()=>{}); 
            document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') { if(document.body.classList.contains('in-game') && !bgm.muted) bgm.play().catch(()=>{}); } else { bgm.muted = true; bgm.pause(); } });
            this.initPrologue(); 
        },
        async initPrologue() {
            await this.setStage('stage-cine'); this.setMood('PANIC');
            this.runAutoSeq('CINE', ["(哭泣聲)嗚嗚，我是飯店的管家小晶...","飯店最近要慶祝滿一周年，","想要展示設計師的珍貴手稿，","結果我...不小心把手稿用不見了...","好心的旅人，你願意陪我尋找嗎？"], () => {
                const txt = document.getElementById('cine-txt'); txt.innerHTML += `<br><div class="promise-ink" onclick="Game.stepHappy()">觸摸螢幕達成約定</div>`; txt.classList.add('fade-in');
            });
        },
        async stepHappy() { this.setMood('HAPPY'); await this.say('cine-txt', "太好了！我該如何稱呼您呢？", false); setTimeout(() => Game.stepInputName(), 1500); },
        /* 修正：輸入姓名時的權限 */
        async stepInputName() { 
            document.body.classList.remove('input-lock'); // 強制解鎖
            const txt = document.getElementById('cine-txt'); 
            txt.innerHTML = `<div style="margin-top:10px;"><input type="text" id="p-name" style="background:transparent;border:none;border-bottom:1.5px solid #fff;color:#fff;text-align:center;font-size:1.1rem;width:160px;" placeholder="您的姓名" autocomplete="off"><br><button class="rpg-btn" onclick="Game.submitName()">開始尋找</button></div>`; 
            txt.classList.add('fade-in');
        },
        submitName() { this.state.userName = document.getElementById('p-name').value || "旅人"; this.checkFinalOrMap(); },
        async checkFinalOrMap() { if(this.state.solved.length >= 6) { await this.setStage('stage-gp'); this.finalAssembly(); } else { this.renderMap(); } },
        async renderMap() {
            await this.setStage('stage-gp'); this.setMood('HAPPY');
            const canvas = document.getElementById('gp-canvas'); canvas.innerHTML = `<div class="map-grid" id="grid"></div>`;
            stationData.slice().reverse().forEach(s => {
                const node = document.createElement('div'); node.className = `node ${this.state.solved.includes(s.id)?'solved':''}`; node.innerText = `${s.f} ${s.name}`;
                node.onclick = (e) => { 
                    e.stopPropagation(); if(this.state.isTyping) return; 
                    if(this.state.solved.includes(s.id)) { this.sayGP(`「${s.name}」層的手稿已經回收囉！`); } 
                    else { if(parseInt(s.f) === this.state.lastFloor) { this.sayGP("這層樓還有未破解的謎題..."); setTimeout(() => this.goChapter(s.id), 1200); } else { this.handleTeleport(s.id); } } 
                };
                document.getElementById('grid').appendChild(node);
            });
            this.updateProg(); this.sayGP("要去哪一層樓找尋失落的手稿呢？");
        },
        async handleTeleport(idx) { 
            await this.setStage('stage-cine'); this.setMood('RUN'); 
            this.runManualSeq('CINE', [`好的，我們前往 ${stationData[idx].f} 樓找尋手稿...`], () => { 
                this.state.lastFloor = parseInt(stationData[idx].f); this.goChapter(idx); 
            }); 
        },
        async goChapter(idx) { 
            await this.setStage('stage-gp'); this.state.curIdx = idx; this.setMood('SEARCH'); 
            document.getElementById('gp-canvas').innerHTML = `<div class="ratio-box"><div class="main-img" id="sk-img" style="background-image:url('${stationData[idx].img}')"></div></div>`; 
            this.runAutoSeq('GP', stationData[idx].intro, () => { 
                this.sayGP("請輸入密鑰，啟動顯影。", false); setTimeout(() => { document.getElementById('cmd-win').style.display = "block"; document.getElementById('p-input').focus(); }, 1000); 
            }); 
        },
        async checkAnswer() {
            const val = document.getElementById('p-input').value; const target = stationData[this.state.curIdx];
            if(val === target.code) {
                document.getElementById('cmd-win').style.display = "none"; document.getElementById('p-input').value = "";
                if(!Game.state.solved.includes(target.id)) Game.state.solved.push(target.id);
                this.updateProg(); this.setMood('HAPPY'); document.getElementById('se-reveal').play().catch(()=>{});
                await this.sayGP(`太好了！找到第 ${this.state.solved.length} 張手稿！`, false);
                if(document.getElementById('sk-img')) document.getElementById('sk-img').classList.add('revealed');
                setTimeout(() => { 
                    this.setMood('SERIOUS'); 
                    this.runManualSeq('GP', target.info, async () => { 
                        if(this.state.solved.length >= 6) { await this.setStage('stage-gp'); this.finalAssembly(); } 
                        else { await this.setStage('stage-gp'); this.renderMap(); }
                    }); 
                }, 2200);
            } else { this.setMood('CRY'); this.sayGP("答案好像不對...", false); document.getElementById('p-input').value = ""; }
        },
        async finalAssembly() {
            document.body.classList.add('input-lock');
            const canvas = document.getElementById('gp-canvas'); document.querySelectorAll('.actor-img').forEach(img => img.classList.remove('visible'));
            canvas.innerHTML = `<div class="ratio-box" id="puzz-box"></div>`;
            document.getElementById('gp-txt').innerText = "手稿重組中..."; 
            const pos = [{t:'0%',l:'0%'}, {t:'0%',l:'33.3%'}, {t:'0%',l:'66.6%'}, {t:'50%',l:'0%'}, {t:'50%',l:'33.3%'}, {t:'50%',l:'66.6%'}];
            for(let i=0; i<6; i++){
                const p = document.createElement('div'); p.className = 'puzzle-piece'; p.style.backgroundImage = `url('${stationData[i].img}')`;
                p.style.top = (Math.random()*160 - 30) +'%'; p.style.left = (Math.random()*160 - 30) +'%'; document.getElementById('puzz-box').appendChild(p);
                setTimeout(() => { p.style.opacity = 1; p.style.top = pos[i].t; p.style.left = pos[i].l; }, 500 * i); 
            }
            setTimeout(() => {
                document.getElementById('puzz-box').innerHTML = `<div class="main-img revealed" style="background-image:url('https://i.meee.com.tw/CfmlAS8.jpg'); background-size:contain; transition: opacity 1.5s ease-in-out;"></div>`;
                setTimeout(() => {
                    this.setMood('CRY'); 
                    this.runAutoSeq('GP', [`${this.state.userName}，太感謝你了！`,`謝謝你陪我一起找到手稿，` ], () => {
                        this.setMood('WINK'); this.runAutoSeq('GP', [`這是一點小小的心意，請收下，`,`噓！不要告訴總經理喔！`], () => this.renderRedeem());
                    });
                }, 1500);
            }, 4500);
        },
        async renderRedeem() { 
            await this.setStage('stage-cine'); this.setMood('WINK'); 
            const txt = document.getElementById('cine-txt');
            txt.innerHTML = `<p style="color:#fff; margin-bottom:15px;">請前往櫃台領取謝禮吧！</p><button class="rpg-btn" onclick="Game.staffCheck()">[ 櫃台核銷 ]</button>`;
            txt.classList.add('fade-in');
        },
        async renderRedeemed() { 
            await this.setStage('stage-cine'); this.setMood('WINK'); 
            const el = document.getElementById('cine-txt');
            el.innerHTML = `<div style="font-size:1.1rem;color:var(--accent);border:2px solid var(--accent);display:inline-block;padding:10px;transform:rotate(-10deg);font-weight:700;margin-bottom:15px;">已核銷</div><p style="color:#fff;">願初衷，隨您一同歸去。</p>`;
            el.classList.add('fade-in');
        },
        setMood(mood) {
            const isCine = document.getElementById('stage-cine').classList.contains('active');
            const el = isCine ? document.getElementById('cine-actor') : document.getElementById('gp-actor');
            if(el) { 
                el.classList.remove('visible'); el.style.visibility = "hidden"; 
                void el.offsetWidth; el.src = ICONS[mood]; 
                setTimeout(() => { el.style.visibility = "visible"; el.classList.add('visible'); }, 50); 
            }
        },
        async say(id, str, showTip = false) {
            this.state.isTyping = true;
            const el = document.getElementById(id); const tip = document.getElementById(id.replace('txt','tip'));
            if(tip) tip.style.display = 'none';
            el.classList.remove('fade-in'); void el.offsetWidth;
            el.innerHTML = str;
            setTimeout(() => {
                el.classList.add('fade-in');
                setTimeout(() => {
                    this.state.isTyping = false;
                    if(showTip && tip && !document.body.classList.contains('input-lock')) tip.style.display = 'block';
                }, 700);
            }, 50);
        },
        sayGP(s, tip = false) { return this.say('gp-txt', s, tip); },
        runAutoSeq(mode, lines, callback) {
            document.body.classList.add('input-lock');
            const txtId = mode === 'CINE' ? 'cine-txt' : 'gp-txt'; let q = [...lines];
            const next = async () => { 
                if (q.length > 0) { 
                    await this.say(txtId, q.shift(), false);
                    if(q.length > 0) setTimeout(next, 2200); 
                    else { document.body.classList.remove('input-lock'); if(callback) callback(); }
                } else { document.body.classList.remove('input-lock'); if(callback) callback(); }
            }; next();
        },
        runManualSeq(mode, lines, callback) {
            const dbId = mode === 'CINE' ? 'cine-db' : 'gp-db';
            const txtId = mode === 'CINE' ? 'cine-txt' : 'gp-txt';
            let q = [...lines];
            const next = async () => {
                const db = document.getElementById(dbId);
                if (db) db.onclick = null;
                if (q.length > 0) {
                    const line = q.shift();
                    const isLast = q.length === 0;
                    await this.say(txtId, line, isLast);
                    if (db) db.onclick = isLast ? () => { db.onclick = null; callback(); } : next;
                }
            }; next();
        },
        updateProg() {
            const bar = document.getElementById('prog-bar');
            if(bar) { bar.innerHTML = ""; for(let i=0; i<6; i++) { const unit = document.createElement('div'); unit.className = 'prog-unit' + (i < this.state.solved.length ? ' filled' : ''); bar.appendChild(unit); } }
            const txt = document.getElementById('prog-text'); if(txt) txt.innerText = `手稿回收進度 ${this.state.solved.length}/6`;
            localStorage.setItem('manuscript_solved', JSON.stringify(this.state.solved));
        },
        staffCheck() { 
            document.body.classList.remove('input-lock'); // 修正：核銷時解鎖
            document.getElementById('cmd-win').style.display = "block"; document.getElementById('p-input').type = "tel"; document.getElementById('p-input').inputMode = "numeric";
            document.getElementById('submit-btn').onclick = () => { 
                if(document.getElementById('p-input').value === "0415") { 
                    document.getElementById('cmd-win').style.display = "none"; localStorage.setItem('manuscript_completed', 'true'); this.renderRedeemed(); 
                } else alert("密碼錯誤"); 
            }; 
        }
    };
    document.getElementById('submit-btn').onclick = () => Game.checkAnswer();
</script>
</body>
</html>
